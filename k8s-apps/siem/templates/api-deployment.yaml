apiVersion: apps/v1
kind: Deployment
metadata:
  name: siem-api
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: siem-api
  template:
    metadata:
      labels:
        app: siem-api
    spec:
      containers:
        - name: api
          image: {{ .Values.images.api }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: REDIS_ADDRESS
              value: {{ printf "%s:%v" .Values.global.redis.host .Values.global.redis.port | quote }}
            - name: REDIS_DB
              value: {{ .Values.global.redis.db | quote }}
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.redis.usernameSecretKey }}
                  optional: true
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.redis.passwordSecretKey }}
                  optional: true
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.postgres.dsnSecretKey }}
            - name: OPENSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.opensearch }}
                  key: {{ .Values.global.opensearch.urlSecretKey }}
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.opensearch }}
                  key: {{ .Values.global.opensearch.usernameSecretKey }}
                  optional: true
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.opensearch }}
                  key: {{ .Values.global.opensearch.passwordSecretKey }}
                  optional: true
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.rabbitmq.urlSecretKey }}
            - name: RESPONSE_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.response.hmacSecretKey }}
            - name: API_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.api.authTokenSecretKey }}
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: siem-api
  namespace: {{ .Values.namespace }}
  labels:
    app: siem-api
    siem.metrics: "true"
spec:
  selector:
    app: siem-api
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      name: http
    - port: {{ .Values.api.service.metricsPort }}
      targetPort: metrics
      name: metrics
