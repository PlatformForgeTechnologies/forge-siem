{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: siem-agent
  namespace: {{ .Values.namespace }}
spec:
  selector:
    matchLabels:
      app: siem-agent
  template:
    metadata:
      labels:
        app: siem-agent
    spec:
      tolerations:
{{ toYaml .Values.agent.daemonset.tolerations | indent 8 }}
      containers:
        - name: agent
          image: {{ .Values.images.agent }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            runAsUser: 0
            runAsGroup: 0
          env:
            - name: AGENT_CONFIG_PATH
              value: /etc/siem/agent.yaml
            - name: RESPONSE_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.response.hmacSecretKey }}
            - name: LOKI_ENABLED
              value: {{ .Values.agent.logOutputs.lokiEnabled | quote }}
{{- if .Values.global.loki.enabled }}
            - name: LOKI_PUSH_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.loki.pushURLSecretKey }}
            - name: LOKI_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.loki.tenantIDSecretKey }}
                  optional: true
            - name: LOKI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.loki.usernameSecretKey }}
                  optional: true
            - name: LOKI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.loki.passwordSecretKey }}
                  optional: true
{{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/siem
            - name: tls
              mountPath: /etc/siem/tls
              readOnly: true
            - name: state
              mountPath: /var/lib/forge-siem-agent/state
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: docker-logs
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: procfs
              mountPath: /host/proc
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: siem-agent-config
        - name: tls
          secret:
            secretName: {{ .Values.global.secretNames.tls }}
        - name: state
          hostPath:
            path: /var/lib/forge-siem-agent/state
            type: DirectoryOrCreate
        - name: varlog
          hostPath:
            path: /var/log
        - name: docker-logs
          hostPath:
            path: /var/lib/docker/containers
        - name: procfs
          hostPath:
            path: /proc
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: siem-agent-config
  namespace: {{ .Values.namespace }}
data:
  agent.yaml: |
    server:
      host: siem-ingest
      port: 1514
      ca_cert: /etc/siem/tls/ca.crt
      client_cert: /etc/siem/tls/tls.crt
      client_key: /etc/siem/tls/tls.key
    log_collection:
      paths:
        - /var/log/auth.log
        - /var/log/syslog
        - /var/log/messages
        - /var/log/containers/*.log
        - /var/log/pods/*/*/*.log
        - /var/lib/docker/containers/*/*.log
      outputs:
        siem:
          enabled: {{ .Values.agent.logOutputs.siemEnabled }}
        loki:
          enabled: {{ .Values.agent.logOutputs.lokiEnabled }}
          push_url: {{ if .Values.global.loki.enabled }}${LOKI_PUSH_URL}{{ else }}""{{ end }}
          tenant_id: {{ if .Values.global.loki.enabled }}${LOKI_TENANT_ID}{{ else }}""{{ end }}
          username: {{ if .Values.global.loki.enabled }}${LOKI_USERNAME}{{ else }}""{{ end }}
          password: {{ if .Values.global.loki.enabled }}${LOKI_PASSWORD}{{ else }}""{{ end }}
          labels:
{{ toYaml .Values.agent.logOutputs.lokiStaticLabels | indent 12 }}
          only_paths:
{{ toYaml .Values.agent.logOutputs.lokiOnlyPaths | indent 12 }}
    fim:
      paths:
        - /etc
        - /usr/bin
        - /home
      schedule: realtime
    response:
      enabled: true
{{- end }}
