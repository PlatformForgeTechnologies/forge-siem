apiVersion: apps/v1
kind: Deployment
metadata:
  name: siem-vuln-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.vulnService.replicas }}
  selector:
    matchLabels:
      app: siem-vuln-service
  template:
    metadata:
      labels:
        app: siem-vuln-service
    spec:
      containers:
        - name: vuln-service
          image: {{ .Values.images.vulnService }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.postgres.dsnSecretKey }}
            - name: OPENSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.opensearch }}
                  key: {{ .Values.global.opensearch.urlSecretKey }}
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.opensearch }}
                  key: {{ .Values.global.opensearch.usernameSecretKey }}
                  optional: true
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.opensearch }}
                  key: {{ .Values.global.opensearch.passwordSecretKey }}
                  optional: true
          ports:
            - containerPort: 9090
              name: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: siem-vuln-service
  namespace: {{ .Values.namespace }}
  labels:
    app: siem-vuln-service
    siem.metrics: "true"
spec:
  selector:
    app: siem-vuln-service
  ports:
    - port: 9090
      targetPort: metrics
      name: metrics
