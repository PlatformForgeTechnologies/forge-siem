apiVersion: apps/v1
kind: Deployment
metadata:
  name: siem-response-orchestrator
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.responseOrchestrator.replicas }}
  selector:
    matchLabels:
      app: siem-response-orchestrator
  template:
    metadata:
      labels:
        app: siem-response-orchestrator
    spec:
      containers:
        - name: response-orchestrator
          image: {{ .Values.images.responseOrchestrator }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: REDIS_ADDRESS
              value: {{ printf "%s:%v" .Values.global.redis.host .Values.global.redis.port | quote }}
            - name: REDIS_DB
              value: {{ .Values.global.redis.db | quote }}
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.redis.usernameSecretKey }}
                  optional: true
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.redis.passwordSecretKey }}
                  optional: true
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.rabbitmq.urlSecretKey }}
            - name: RESPONSE_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretNames.runtime }}
                  key: {{ .Values.global.response.hmacSecretKey }}
          ports:
            - containerPort: 9090
              name: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: siem-response-orchestrator
  namespace: {{ .Values.namespace }}
  labels:
    app: siem-response-orchestrator
    siem.metrics: "true"
spec:
  selector:
    app: siem-response-orchestrator
  ports:
    - port: 9090
      targetPort: metrics
      name: metrics
